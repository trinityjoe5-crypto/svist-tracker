<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŠVIST Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #1D9E75;
    --green-bg: rgba(29,158,117,0.12);
    --green-text: #2ecf9a;
    --red: #D85A30;
    --red-bg: rgba(216,90,48,0.12);
    --red-text: #f07050;
    --amber: #EF9F27;
    --blue: #378ADD;
    --blue-bg: rgba(55,138,221,0.12);
    --blue-text: #6ab0f5;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--amber);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .logo-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

  .sync-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
    font-size: 12px;
    color: var(--text2);
    background: var(--surface);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .dot.ok { background: var(--green); }
  .dot.err { background: var(--red); }
  .dot.loading { background: var(--amber); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
  .stat-value.green { color: var(--green-text); }
  .stat-value.red { color: var(--red-text); }
  .stat-unit { font-size: 13px; font-weight: 400; color: var(--text2); margin-left: 2px; }

  .progress-wrap { margin-bottom: 1.25rem; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .progress-fill.warn { background: var(--amber); }
  .progress-fill.danger { background: var(--red); }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }

  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-bottom: 12px; }

  .add-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .field label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 5px; }

  select, input[type=text], input[type=number] {
    width: 100%;
    height: 38px;
    padding: 0 11px;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  select:focus, input:focus { border-color: rgba(255,255,255,0.3); }

  .btn {
    width: 100%;
    height: 38px;
    border-radius: var(--radius);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--amber); color: #000; }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 0.5px solid var(--border2);
  }
  .btn-ghost:hover { color: var(--text); }

  .log-header {
    display: grid;
    grid-template-columns: 52px 1fr 60px 52px 28px;
    gap: 8px;
    padding: 0 0 8px;
    border-bottom: 0.5px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }

  .log-row {
    display: grid;
    grid-template-columns: 52px 1fr 60px 52px 28px;
    gap: 8px;
    padding: 10px 0;
    font-size: 13px;
    border-bottom: 0.5px solid var(--border);
    align-items: center;
    transition: background 0.1s;
  }

  .log-row:last-child { border-bottom: none; }

  .log-date { color: var(--text2); font-size: 12px; }
  .log-note { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-mins { color: var(--text); font-variant-numeric: tabular-nums; }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-alex { background: var(--blue-bg); color: var(--blue-text); }
  .badge-juro { background: var(--green-bg); color: var(--green-text); }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 18px;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--red-text); }

  .empty {
    text-align: center;
    padding: 2rem 0;
    color: var(--text3);
    font-size: 13px;
  }

  .who-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }

  .who-stat { font-size: 12px; color: var(--text2); }
  .who-stat span { font-weight: 500; font-size: 14px; }
  .who-stat .alex { color: var(--blue-text); }
  .who-stat .brat { color: var(--green-text); }

  .reset-link {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .reset-link:hover { color: var(--red-text); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🛴</div>
      <div>
        <div class="logo-text">ŠVIST</div>
        <div class="logo-sub">350 min · 30 dní · Sandro + Juro</div>
      </div>
    </div>
    <div class="sync-badge">
      <div class="dot loading" id="dot"></div>
      <span id="sync-txt">Pripájam...</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat">
      <div class="stat-label">Zostatok</div>
      <div class="stat-value green" id="rem-val">350<span class="stat-unit">min</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Použité</div>
      <div class="stat-value" id="used-val">0<span class="stat-unit">min</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Jazdy</div>
      <div class="stat-value" id="rides-val">0</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Minúty</span>
      <span id="pct-txt">0% spotrebovaných</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="bar" style="width:0%"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Pridať jazdu</div>
    <div class="add-grid">
      <div class="field">
        <label>Kto</label>
        <select id="who">
          <option value="Sandro">Sandro</option>
          <option value="Juro">Juro</option>
        </select>
      </div>
      <div class="field">
        <label>Minúty</label>
        <input type="number" id="mins" value="16" min="1" max="350">
      </div>
    </div>
    <div class="field" style="margin-bottom:8px">
      <label>Poznámka (nepovinné)</label>
      <input type="text" id="note" placeholder="napr. z práce domov">
    </div>
    <button class="btn btn-primary" id="add-btn" onclick="addRide()">+ Pridať jazdu</button>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">História</div>
      <button class="reset-link" onclick="resetAll()">Vymazať všetko</button>
    </div>
    <div class="log-header">
      <span>Dátum</span>
      <span>Poznámka</span>
      <span>Kto</span>
      <span>Min</span>
      <span></span>
    </div>
    <div id="log-body">
      <div class="empty">Zatiaľ žiadne jazdy</div>
    </div>
    <div class="who-split" id="who-split" style="display:none">
      <div class="who-stat">Sandro: <span class="alex" id="alex-total">0 min</span></div>
      <div class="who-stat">Juro: <span class="brat" id="brat-total">0 min</span></div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXDdZoDDshotCyaaA7NXIzw5hFQ8M9gKo",
  authDomain: "svist-ab916.firebaseapp.com",
  databaseURL: "https://svist-ab916-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "svist-ab916",
  storageBucket: "svist-ab916.firebasestorage.app",
  messagingSenderId: "132604382770",
  appId: "1:132604382770:web:84b5b27a4d032651b8362b",
  measurementId: "G-BVP54SDKSE"
};

const TOTAL = 350;
let rides = [];

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ridesRef = ref(db, 'rides');

function setStatus(state, msg) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('sync-txt').textContent = msg;
}

onValue(ridesRef, (snap) => {
  const data = snap.val();
  rides = data ? Object.values(data).sort((a,b) => new Date(b.date) - new Date(a.date)) : [];
  render();
  setStatus('ok', 'Sync aktívny');
}, (err) => {
  setStatus('err', 'Chyba spojenia');
});

function fmt(d) {
  return new Date(d).toLocaleDateString('sk-SK', { day: '2-digit', month: '2-digit' });
}

function render() {
  const used = rides.reduce((s,r) => s + r.mins, 0);
  const rem = TOTAL - used;
  const pct = Math.round((used / TOTAL) * 100);

  document.getElementById('rem-val').innerHTML = rem + '<span class="stat-unit">min</span>';
  document.getElementById('rem-val').className = 'stat-value ' + (rem < 60 ? 'red' : 'green');
  document.getElementById('used-val').innerHTML = used + '<span class="stat-unit">min</span>';
  document.getElementById('rides-val').textContent = rides.length;
  document.getElementById('pct-txt').textContent = pct + '% spotrebovaných';

  const bar = document.getElementById('bar');
  bar.style.width = Math.min(pct, 100) + '%';
  bar.className = 'progress-fill' + (pct > 85 ? ' danger' : pct > 65 ? ' warn' : '');

  const alexMin = rides.filter(r => r.who === 'Sandro').reduce((s,r) => s+r.mins, 0);
  const bratMin = rides.filter(r => r.who === 'Juro').reduce((s,r) => s+r.mins, 0);

  const body = document.getElementById('log-body');
  const split = document.getElementById('who-split');

  if (!rides.length) {
    body.innerHTML = '<div class="empty">Zatiaľ žiadne jazdy</div>';
    split.style.display = 'none';
    return;
  }

  split.style.display = 'grid';
  document.getElementById('alex-total').textContent = alexMin + ' min';
  document.getElementById('brat-total').textContent = bratMin + ' min';

  body.innerHTML = rides.map((r, i) => {
    const bc = r.who === 'Sandro' ? 'badge-alex' : 'badge-juro';
    return `<div class="log-row">
      <span class="log-date">${fmt(r.date)}</span>
      <span class="log-note">${r.note || '—'}</span>
      <span><span class="badge ${bc}">${r.who}</span></span>
      <span class="log-mins">${r.mins}</span>
      <button class="del-btn" onclick="window.delRide(${r.id})">×</button>
    </div>`;
  }).join('');
}

async function saveRides(newRides) {
  const obj = {};
  newRides.forEach(r => { obj[r.id] = r; });
  await set(ridesRef, obj.length === 0 ? null : obj);
}

window.addRide = async function() {
  const who = document.getElementById('who').value;
  const note = document.getElementById('note').value.trim();
  const mins = parseInt(document.getElementById('mins').value) || 0;
  if (mins <= 0) return;
  const used = rides.reduce((s,r) => s+r.mins, 0);
  if (used + mins > TOTAL) { alert('Nestačia minúty! Zostatok: ' + (TOTAL - used) + ' min'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  const newRide = { id: Date.now(), who, note, mins, date: new Date().toISOString() };
  const updated = [newRide, ...rides];
  const obj = {};
  updated.forEach(r => { obj[r.id] = r; });
  await set(ridesRef, obj);
  document.getElementById('note').value = '';
  document.getElementById('mins').value = '16';
  btn.disabled = false;
};

window.delRide = async function(id) {
  const updated = rides.filter(r => r.id !== id);
  const obj = {};
  updated.forEach(r => { obj[r.id] = r; });
  await set(ridesRef, updated.length ? obj : null);
};

window.resetAll = async function() {
  if (!confirm('Vymazať všetky jazdy?')) return;
  await set(ridesRef, null);
};
</script>
</body>
</html>
